spring:
  application:
    name: exam-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:exam_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: true

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-flash-latest
  api-url: https://generativelanguage.googleapis.com/v1beta/models/

jwt:
  # secret: ${JWT_SECRET} # Removed, using RS256
  jwks-uri: ${AUTH_SERVICE_URL:http://auth:8080}/api/auth/.well-known/jwks.json

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.app.exam: DEBUG
    org.springframework.web: INFO
