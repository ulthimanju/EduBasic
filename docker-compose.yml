services:
  neo4j:
    image: neo4j:5.26-community
    container_name: edubasic-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  redis:
    image: redis:7.4-alpine
    container_name: edubasic-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: edubasic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-exam_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: edubasic-auth
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_SECURE: ${COOKIE_SECURE}
    depends_on:
      - neo4j
      - redis

  exam:
    build:
      context: ./exam
      dockerfile: Dockerfile
    container_name: edubasic-exam
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-exam_db}
      POSTGRES_HOST: postgres
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_EXAM_API_BASE_URL: ${VITE_EXAM_API_BASE_URL:-http://localhost:8081}
    container_name: edubasic-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - auth
      - exam

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
