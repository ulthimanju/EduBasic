# CHANGED: Using modern format (no version key required for Compose V2+)
# CHANGED: Added shared configuration via YAML extension blocks to reduce duplication
x-common-config: &common-config
  restart: unless-stopped
  networks:
    - edubasic-net
  security_opt:
    - no-new-privileges:true # CHANGED: Added security hardening to prevent privilege escalation

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: edubasic-neo4j
    <<: *common-config
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck: # CHANGED: Added healthcheck for database readiness
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: edubasic-redis
    <<: *common-config
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: edubasic-postgres
    <<: *common-config
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: exam_db,sandbox_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: edubasic-zookeeper
    <<: *common-config
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: edubasic-kafka
    <<: *common-config
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_started

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: edubasic-auth
    <<: *common-config
    ports:
      - "8080:8080"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      ALLOW_EPHEMERAL_KEYS: ${ALLOW_EPHEMERAL_KEYS:-false}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_SECURE: ${COOKIE_SECURE}
    depends_on:
      neo4j:
        condition: service_healthy # CHANGED: Using long-form depends_on with health condition
      redis:
        condition: service_healthy # CHANGED: Using long-form depends_on with health condition
    healthcheck: # CHANGED: Added healthcheck via Spring Actuator endpoint
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  exam:
    build:
      context: ./exam
      dockerfile: Dockerfile
    container_name: edubasic-exam
    <<: *common-config
    ports:
      - "8081:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-exam_db}
      POSTGRES_HOST: postgres
      KAFKA_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy # CHANGED: Ensure database is ready before application starts
      redis:
        condition: service_healthy # CHANGED: Ensure cache is ready before application starts
      kafka:
        condition: service_started
    healthcheck: # CHANGED: Added healthcheck via Spring Actuator endpoint
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sandbox:
    build:
      context: ./sandbox-service
      dockerfile: Dockerfile
    container_name: edubasic-sandbox
    <<: *common-config
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: sandbox_db
      POSTGRES_HOST: postgres
      KAFKA_SERVERS: kafka:9092
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_EXAM_API_BASE_URL: ${VITE_EXAM_API_BASE_URL:-http://localhost:8081}
    container_name: edubasic-frontend
    <<: *common-config
    ports:
      - "5173:80"
    depends_on:
      auth:
        condition: service_healthy # CHANGED: Ensure auth API is healthy
      exam:
        condition: service_healthy # CHANGED: Ensure exam API is healthy
    healthcheck: # CHANGED: Added healthcheck for Nginx web server
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks: # CHANGED: Defined custom bridge network for better service isolation
  edubasic-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
