# Production Docker Compose for EduBasic
# Focus: Security, Resource Isolation, and Internal Networking

x-common-config: &common-config
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        cpus: '0.50'
        memory: 512M
      reservations:
        memory: 128M

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: edubasic-neo4j-prod
    <<: *common-config
    networks:
      - edubasic-internal
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7.4-alpine
    container_name: edubasic-redis-prod
    <<: *common-config
    networks:
      - edubasic-internal
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: edubasic-postgres-prod
    <<: *common-config
    networks:
      - edubasic-internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: exam_db,sandbox_db,course_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: edubasic-zookeeper-prod
    <<: *common-config
    networks:
      - edubasic-internal
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: edubasic-kafka-prod
    <<: *common-config
    networks:
      - edubasic-internal
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_started

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: edubasic-auth-prod
    <<: *common-config
    networks:
      - edubasic-internal
      - edubasic-public
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      ALLOW_EPHEMERAL_KEYS: 'false'
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_SECURE: 'true'
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  exam:
    build:
      context: ./exam
      dockerfile: Dockerfile
    container_name: edubasic-exam-prod
    <<: *common-config
    networks:
      - edubasic-internal
      - edubasic-public
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: exam_db
      POSTGRES_HOST: postgres
      KAFKA_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sandbox:
    build:
      context: ./sandbox-service
      dockerfile: Dockerfile
    container_name: edubasic-sandbox-prod
    <<: *common-config
    networks:
      - edubasic-internal
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: sandbox_db
      POSTGRES_HOST: postgres
      KAFKA_SERVERS: kafka:9092
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: edubasic-course-prod
    <<: *common-config
    networks:
      - edubasic-internal
      - edubasic-public
    environment:
      DB_HOST: postgres
      DB_NAME: course_db
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_EXAM_COMPLETED: exam-completed
      KAFKA_TOPIC_COURSE_COMPLETED: course-completed
      AUTH_JWKS_URI: http://auth:8080/api/v1/auth/.well-known/jwks.json
      EXAM_SERVICE_URL: http://exam:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PROD_API_BASE_URL}
        VITE_EXAM_API_BASE_URL: ${PROD_EXAM_API_BASE_URL}
        VITE_COURSE_SERVICE_URL: ${PROD_COURSE_SERVICE_URL}
    container_name: edubasic-frontend-prod
    <<: *common-config
    networks:
      - edubasic-public
    ports:
      - "80:80"
    depends_on:
      auth:
        condition: service_healthy
      exam:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  edubasic-internal:
    driver: bridge
    internal: true # CHANGED: Restricted network with no external access
  edubasic-public:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
