spring.application.name=edubasic-backend
server.port=8080

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Neo4j Configuration
spring.neo4j.uri=you_database_url
spring.neo4j.authentication.username=database_username
spring.neo4j.authentication.password=database_password
spring.data.neo4j.database=neo4j

# Gemini API Configuration
gemini.api.key=${GOOGLE_API_KEY:you_key}
gemini.model=gemini-2.5-flash

# Frontend URL Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Gemini API Base URL Configuration
app.gemini.api.base-url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}

# Logging Configuration - Suppress verbose Neo4j query logs
logging.level.org.springframework.data.neo4j.cypher=ERROR
logging.level.org.neo4j.driver=WARN
logging.level.root=WARN
logging.level.com.edubas=INFO
logging.level.org.springframework.boot.autoconfigure.security=OFF
logging.level.org.springframework.boot.devtools=OFF
logging.level.org.springframework.boot.web.embedded.tomcat=WARN
spring.main.banner-mode=off

