server:
  port: 8083

spring:
  application:
    name: course-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:course_db}
    username: ${DB_USER:nexora}
    password: ${DB_PASSWORD:nexora}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    template:
      observation-enabled: true
    consumer:
      group-id: course-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.nexora.*"
        spring.json.value.default.type: com.nexora.courseservice.event.ExamCompletedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

kafka:
  topics:
    exam-completed: ${KAFKA_TOPIC_EXAM_COMPLETED:exam-completed}
    course-completed: ${KAFKA_TOPIC_COURSE_COMPLETED:course-completed}

auth:
  jwks-uri: ${AUTH_JWKS_URI:http://auth-service:8080/api/v1/auth/.well-known/jwks.json}

exam:
  service:
    base-url: ${EXAM_SERVICE_URL:http://exam-service:8082}
    timeout-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    com.nexora.courseservice: DEBUG
    org.flywaydb: INFO
