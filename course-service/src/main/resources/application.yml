server:
  port: 8083

spring:
  application:
    name: course-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:course_db}
    username: ${DB_USER:nexora}
    password: ${DB_PASSWORD:nexora}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: course-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.nexora.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

auth:
  jwks-uri: ${AUTH_JWKS_URI:http://auth-service:8080/api/v1/auth/.well-known/jwks.json}

exam:
  service:
    base-url: ${EXAM_SERVICE_URL:http://exam-service:8082}
    timeout-seconds: 5

logging:
  level:
    com.nexora.courseservice: DEBUG
    org.flywaydb: INFO
