spring:
  application:
    name: auth-app

  # ── OAuth2 ──────────────────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
        provider:
          google:
            issuer-uri: https://accounts.google.com

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    uri: bolt://neo4j:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD}

  # ── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
      connect-timeout: 2000ms
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10
          max-wait: 2000ms

  # ── Cache ───────────────────────────────────────────────────────────────────
  cache:
    type: redis

# ── Application properties ────────────────────────────────────────────────────
app:
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    expiration-seconds: 3600
    allow-ephemeral-keys: ${ALLOW_EPHEMERAL_KEYS:false}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
  security:
    admin:
      allowed-emails: ${ADMIN_ALLOWED_EMAILS:}

# ── Actuator & Management ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.app.auth: INFO
    org.springframework.security: INFO
    org.springframework.data.neo4j.cypher.deprecation: ERROR
